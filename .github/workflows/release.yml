name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            asset_os: mac
            asset_arch: arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            asset_os: mac
            asset_arch: x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            asset_os: win
            asset_arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Read version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Stage release assets (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          VERSION="${{ steps.pkg.outputs.version }}"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          DMG=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -n1 || true)
          if [ -z "$DMG" ]; then
            echo "::error::DMG not found under $DMG_DIR"
            ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" || true
            exit 1
          fi
          cp "$DMG" "staging/Arbiter-${VERSION}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.dmg"

      - name: Stage release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          $version = "${{ steps.pkg.outputs.version }}"
          $os = "${{ matrix.asset_os }}"
          $arch = "${{ matrix.asset_arch }}"
          $nsis = Get-ChildItem -Path src-tauri\target\release\bundle\nsis\*-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsis) {
            Write-Error "NSIS installer not found under src-tauri\target\release\bundle\nsis"
            Get-ChildItem -Path src-tauri\target\release\bundle\ -Recurse | Select-Object FullName
            exit 1
          }
          Copy-Item $nsis.FullName "staging\Arbiter-Setup-$version-$os-$arch.exe"
          Copy-Item src-tauri\target\release\arbiter.exe "staging\Arbiter-$version-$os-$arch.exe"

      - name: Publish to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Arbiter ${{ github.ref_name }}'
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: staging/*

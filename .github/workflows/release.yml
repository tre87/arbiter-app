# Release workflow for the NATIVE app (arbiter-native, Rust + iced, bundled with
# cargo-packager). Mirrors the web app's old release.yml — same triggers, same
# asset naming — and adds a Windows ARM64 build.
#
# Signing/notarization are intentionally NOT configured yet (unsigned artifacts —
# Gatekeeper/SmartScreen will warn). Add macOS signingIdentity/notarization and
# Windows certificateThumbprint to Cargo.toml's [package.metadata.packager] (or
# via env) once certs are available.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: aarch64-apple-darwin
            asset_os: mac
            asset_arch: arm64
            formats: app,dmg
          - platform: macos-26
            target: x86_64-apple-darwin
            asset_os: mac
            asset_arch: x64
            formats: app,dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: win
            asset_arch: x64
            formats: nsis
          # Native ARM64 Windows runner (no cross-compile). If unavailable on the
          # repo's plan, switch platform to windows-latest and rely on cross-build.
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_os: win
            asset_arch: arm64
            formats: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*\"(.*)\".*/\1/')" >> "$GITHUB_OUTPUT"

      # Default features include `usage-helper` (wry/tao) so the usage bars work.
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin arbiter

      # cargo-packager fetches its own NSIS toolchain and adds the WebView2
      # bootstrapper to the installer automatically.
      - name: Package
        run: cargo packager --release --target ${{ matrix.target }} --formats ${{ matrix.formats }}

      - name: Stage release assets (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          V="${{ steps.ver.outputs.version }}"
          OUT="target/${{ matrix.target }}/release"
          DMG=$(ls "$OUT"/*.dmg 2>/dev/null | head -n1 || true)
          if [ -z "$DMG" ]; then
            echo "::error::DMG not found under $OUT"; ls -la "$OUT" || true; exit 1
          fi
          cp "$DMG" "staging/Arbiter-${V}-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.dmg"

      - name: Stage release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          $v = "${{ steps.ver.outputs.version }}"
          $os = "${{ matrix.asset_os }}"
          $arch = "${{ matrix.asset_arch }}"
          $out = "target/${{ matrix.target }}/release"
          $nsis = Get-ChildItem -Path "$out/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsis) {
            Write-Error "NSIS installer not found under $out"
            Get-ChildItem -Path $out -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Copy-Item $nsis.FullName "staging/Arbiter-Setup-$v-$os-$arch.exe"
          Copy-Item "$out/arbiter.exe" "staging/Arbiter-$v-$os-$arch.exe"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Arbiter ${{ github.ref_name }}'
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: staging/*

<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="160" y1="90" x2="870" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121826"/>
      <stop offset="0.58" stop-color="#090E18"/>
      <stop offset="1" stop-color="#04070D"/>
    </linearGradient>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(512 500) rotate(90) scale(320)">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.32"/>
      <stop offset="0.45" stop-color="#38BDF8" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="blue" x1="300" y1="280" x2="724" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93C5FD"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="235" fill="url(#bg)"/>
  <rect x="3" y="3" width="1018" height="1018" rx="232" stroke="#1E293B" stroke-width="6"/>

  <circle cx="512" cy="500" r="300" fill="url(#glow)"/>

  <g opacity="0.7" filter="url(#softGlow)">
    <g stroke="#1E3A8A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M238 330H326L378 382"/>
      <path d="M786 330H698L646 382"/>
      <path d="M238 694H326L378 642"/>
      <path d="M786 694H698L646 642"/>
    </g>
    <g stroke="url(#blue)" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M238 330H326L378 382"/>
      <path d="M786 330H698L646 382"/>
      <path d="M238 694H326L378 642"/>
      <path d="M786 694H698L646 642"/>
    </g>
    <g fill="#3B82F6">
      <circle cx="326" cy="330" r="9"/>
      <circle cx="698" cy="330" r="9"/>
      <circle cx="326" cy="694" r="9"/>
      <circle cx="698" cy="694" r="9"/>
    </g>
  </g>

  <g filter="url(#coreGlow)">
    <rect x="206" y="250" width="612" height="524" rx="108" fill="#08111E"/>
    <rect x="206" y="250" width="612" height="524" rx="108" stroke="#2563EB" stroke-opacity="0.82" stroke-width="16"/>
    <rect x="206" y="250" width="612" height="524" rx="108" stroke="#93C5FD" stroke-opacity="0.12" stroke-width="4"/>
  </g>

  <g filter="url(#coreGlow)">
    <path d="M332 388L554 512L332 636" stroke="#EAF6FF" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M608 612H734" stroke="#EAF6FF" stroke-width="54" stroke-linecap="round"/>
  </g>

  <path d="M188 172C278 98 392 60 512 60C632 60 746 98 836 172" stroke="#E2E8F0" stroke-opacity="0.05" stroke-width="20" stroke-linecap="round"/>
</svg>
